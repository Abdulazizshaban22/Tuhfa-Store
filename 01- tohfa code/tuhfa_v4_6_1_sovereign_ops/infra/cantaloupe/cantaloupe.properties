
# Cantaloupe minimal config
http.host = 0.0.0.0
http.port = 8182
endpoint.iiif.2.enabled = true
endpoint.iiif.3.enabled = true

# Filesystem resolver (dev)
resolver.static = FilesystemResolver
FilesystemResolver.BasicLookupStrategy.path_prefix = /var/cantaloupe/images

# Cache (dev - off)
cache.server.resolve = false
cache.server.derivative = false

# Security (set keys/headers in production)
