
version: "3.9"
services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tuhfa
    ports: ["5432:5432"]
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/0_init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/1_seed.sql
