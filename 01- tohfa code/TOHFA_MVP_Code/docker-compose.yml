version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tohfa_db
    environment:
      POSTGRES_DB: tohfa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: tohfa_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tohfa?schema=public
      PORT: 4000
      CORS_ORIGINS: http://localhost:3000
    ports: ["4000:4000"]
    command: sh -lc "npm run prisma:generate && npx prisma migrate deploy && node dist/main.js"

  web:
    build:
      context: ./frontend
    container_name: tohfa_web
    environment:
      NEXT_PUBLIC_API_BASE: http://api:4000
    ports: ["3000:3000"]
    command: sh -lc "npm ci && npm run dev"
    depends_on:
      - api
