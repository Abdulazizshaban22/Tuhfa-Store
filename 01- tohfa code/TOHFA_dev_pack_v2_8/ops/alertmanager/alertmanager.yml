# ops/alertmanager/alertmanager.yml
global:
  resolve_timeout: 5m
  # Option A (classic): Slack webhook URL
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 2h
  receiver: 'slack'

receivers:
- name: 'slack'
  slack_configs:
  - channel: '#alerts'
    send_resolved: true
    title: '{{ template "slack.title" . }}'
    text: '{{ template "slack.text" . }}'

templates:
- '/etc/alertmanager/templates/*.tmpl'
