version: '3.9'
services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: tohfa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tohfa
      PORT: 3001
      ETH_RPC: ${ETH_RPC}
      TOHFA_ERC721: ${TOHFA_ERC721}
      OWNER_PK: ${OWNER_PK}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    depends_on: [db]
    ports: ["3001:3001"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:3001
    depends_on: [api]
    ports: ["3000:3000"]
