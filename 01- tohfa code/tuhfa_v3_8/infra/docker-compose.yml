version: "3.8"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tuhfa
      POSTGRES_USER: tuhfa
      POSTGRES_PASSWORD: tuhfa
    ports: ["5432:5432"]
    volumes: ["./pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  # Note: أضف Redpanda/Kafka إذا احتجت تدفقات أحداث لاحقًا
