
version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: tuhfa
      POSTGRES_USER: tuhfa
      POSTGRES_DB: tuhfa
    ports: ["5432:5432"]
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
  ai:
    build: ./services/ai_caption
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=development
    command: sh -c "npm i --silent && npm run dev -- --port 3000"
    ports: ["3000:3000"]
