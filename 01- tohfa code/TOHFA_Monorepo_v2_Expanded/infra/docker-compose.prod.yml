version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tohfa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../apps/api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tohfa?schema=public
      PORT: 4000
      CORS_ORIGINS: http://localhost:3000
      PAYMENTS_PROVIDER: tap
      TAP_SECRET_KEY: sk_test_xxx
    depends_on: [db]
    ports: ["4000:4000"]

  web:
    build: ../apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: devsecret
    depends_on: [api]
    ports: ["3000:3000"]

  ai:
    build: ../apps/ai
    environment: {}
    ports: ["8001:8001"]
